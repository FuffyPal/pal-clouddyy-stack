services:
  pelican-db:
    image: docker.io/library/mariadb:10.11
    container_name: pelican-db
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${PELICAN_DB_ROOT_PASS}
      - MARIADB_PASSWORD=${PELICAN_DB_PASS}
      - MARIADB_DATABASE=pelican
      - MARIADB_USER=pelican
    volumes:
      - pelican-db:/var/lib/mysql:Z
    networks:
      - cloud_internal
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 256M

  pelican-app:
    image: ghcr.io/pelican-dev/panel:latest
    container_name: pelican-app
    restart: always
    depends_on:
      - pelican-db
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=0
    environment:
      - XDG_DATA_HOME=/pelican-data
      - APP_URL=${PELICAN_SITE_URL}
      - ADMIN_EMAIL=${PELICAN_ADMIN_EMAIL}
      - DB_CONNECTION=mysql
      - DB_HOST=pelican-db
      - DB_PORT=3306
      - DB_DATABASE=pelican
      - DB_USERNAME=pelican
      - DB_PASSWORD=${PELICAN_DB_PASS}
      - BEHIND_PROXY=true # Let's Encrypt hatasını çözen kritik satır!
    volumes:
      - pelican-data:/pelican-data:rw,Z
      - pelican-logs:/var/www/html/storage/logs:rw,Z
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cloud_public
      - cloud_internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    security_opt:
      - "label=disable"

volumes:
  pelican-db:
  pelican-data:
  pelican-logs:

networks:
  cloud_public:
    external: true
  cloud_internal:
    external: true
