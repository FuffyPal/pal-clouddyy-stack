concurrent = 4
check_interval = 0

[session_server]
  session_timeout = 1800

[[runners]]
  name = "pal-runner"
  url = "https://gitlab.com"
  token = "glrt-"
  executor = "docker"
  request_concurrency = 4
  [runners.custom_build_dir]
  [runners.cache]
    MaxUploadedArchiveSize = 0
  [runners.docker]
    tls_verify = false
    image = "alpine:latest"
    privileged = true
    disable_entrypoint_overwrite = false
    oom_kill_disable = false
    disable_cache = false
    volumes = ["/run/user/1001/podman/podman.sock:/var/run/docker.sock", "/cache"]
    shm_size = 2000000000
