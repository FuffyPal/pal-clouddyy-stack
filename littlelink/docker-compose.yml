services:
  littlelink-app:
    build:
      context: ./littlelink/.
      dockerfile: Dockerfile
      args:
        repo: ${littlelink_git_repo:-https://github.com/FuffyPal/littlelink.git}
    container_name: littlelink-app
    restart: unless-stopped
    networks:
      - cloud_public
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
networks:
  cloud_public:
    external: true
