services:
  scp-server:
    build:
      context: .
      dockerfile: dockerfile
    image: scpsl-dedicated:latest
    container_name: scp-secret-laboratory

    stdin_open: true
    tty: true

    # Security: do not run as root, no host system access
    user: "1500:1500"
    read_only: false          # must be false so the server can write config/logs

    security_opt:
      - no-new-privileges:true   # prevent setuid/setgid privilege escalation
      - label:disable            # disable SELinux label confinement for this container

    cap_drop:
      - ALL                      # drop all Linux capabilities

    # Restart policy
    restart: unless-stopped

    # Game ports
    ports:
      - "7777:7777/udp"         # game traffic

    # Persistent data — accessible only by the scp user
    # :Z tells SELinux to relabel the host directory so the container can read/write
    volumes:
      # Plugins (host → container, read/write)
      - "./scp_plugins_labapi:/home/scp/.config/SCP Secret Laboratory/LabAPI:Z"
      # Configuration files
      - "./scp_config:/home/scp/.config/SCP Secret Laboratory/config:Z"
      # Server files — uncomment to expose externally (already present in the image)
      - scpsl_server:/opt/scpsl/server

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.50"
          memory: 1G

    # Environment variables (override if needed)
    environment:
      - DISPLAY=
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1

volumes:
  scpsl_server: